<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>

<h2>Dzielenie liczb</h2>

<input type="text" id="a" placeholder="Liczba 1">
<input type="text" id="b" placeholder="Liczba 2">
<button onclick="dziel()">Podziel</button>

<p id="wynik"></p>

<script>
function dziel() {
    const a = document.getElementById("a").value;
    const b = document.getElementById("b").value;
    const wynik = document.getElementById("wynik");

    try {
        if (a === "" || b === "") {
            throw "Uzupełnij oba pola!";
        }

        const num1 = parseFloat(a);
        const num2 = parseFloat(b);

        if (isNaN(num1) || isNaN(num2)) {
            throw "Podaj poprawne liczby!";
        }

        if (num2 === 0) {
            throw "Nie można dzielić przez 0!";
        }

        wynik.textContent = "Wynik: " + (num1 / num2);
    } catch (e) {
        wynik.textContent = "Błąd: " + e;
    }
}
</script>

</body>
</html>
