<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>

<h1>Aktualny czas w Polsce:</h1>
<p id="czas"></p>

<script>
fetch("https://timeapi.io/api/Time/current/zone?timeZone=Europe/Warsaw")
    .then(res => res.json())
    .then(data => {
        document.getElementById("czas").textContent =
            data.hour.toString().padStart(2, '0') + ":" +
            data.minute.toString().padStart(2, '0') + ":" +
            data.seconds.toString().padStart(2, '0');
    })
    .catch(err => {
        document.getElementById("czas").textContent = "Błąd pobierania czasu";
        console.error(err);
    });
</script>

</body>
</html>
