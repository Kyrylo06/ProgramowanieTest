<!DOCTYPE html>
<html>
<body>

<script>
function fibonacci(n) {
    let tab = [];

    if (n >= 1) tab.push(0);
    if (n >= 2) tab.push(1);

    for (let i = 2; i < n; i++) {
        tab.push(tab[i - 1] + tab[i - 2]);
    }

    console.log(tab);
}

fibonacci(10);
</script>

</body>
</html>
